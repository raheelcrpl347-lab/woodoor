<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Panel | Woodoor</title>
    <meta
      name="description"
      content="Admin panel to manage website products and gallery images."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Open+Sans:wght@400;600;700&family=Poppins:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="admin">
    <header class="header">
      <div class="container nav">
        <a class="logo" href="index.html">Wood<span>oor</span></a>
        <button class="menu-btn" aria-label="Toggle menu">&#9776;</button>
        <nav class="nav-links">
          <a href="index.html">Home</a>
          <a href="shop.html">Shop</a>
          <a href="gallery.html">Gallery</a>
          <a class="active" href="admin.html">Admin</a>
        </nav>
      </div>
    </header>

    <main class="section">
      <div class="container">
        <h1 class="section-title">Admin Dashboard</h1>
        <p class="section-subtitle">
          Login karke products aur gallery images add/remove karein.
        </p>

        <form id="admin-login-form" class="animate">
          <h3 style="font-family: Poppins, sans-serif; margin-bottom: 10px">
            Admin Login
          </h3>
          <label for="admin-username">Username</label>
          <input id="admin-username" type="text" placeholder="admin" required />
          <label for="admin-password">Password</label>
          <input
            id="admin-password"
            type="password"
            placeholder="admin123"
            required
          />
          <button class="btn btn-primary" type="submit">Login</button>
        </form>

        <section id="admin-panel" style="display: none">
          <div class="hero-actions" style="margin-bottom: 20px">
            <button id="admin-logout" class="btn btn-outline dark" type="button">
              Logout
            </button>
          </div>

          <div class="contact-grid">
            <form id="add-product-form" class="animate">
              <h3 style="font-family: Poppins, sans-serif; margin-bottom: 10px">
                Add Product
              </h3>
              <p id="product-status" class="form-status"></p>
              <label for="product-name">Name</label>
              <input id="product-name" type="text" placeholder="Enter product name" maxlength="80" required />
              <label for="product-price">Price</label>
              <input
                id="product-price"
                type="number"
                min="0"
                step="1"
                inputmode="numeric"
                placeholder="Enter price amount in PKR"
                required
              />
              <label for="product-category">Category</label>
              <input
                id="product-category"
                type="text"
                placeholder="Room, Main, or Window"
                required
              />
              <label for="product-material">Material</label>
              <input
                id="product-material"
                type="text"
                placeholder="Sheesham, Deodar, Oak..."
                required
              />
              <label for="product-color">Color</label>
              <input id="product-color" type="text" placeholder="Color" maxlength="30" required />
              <button class="btn btn-primary" type="submit">Add Product</button>
            </form>

            <form id="add-gallery-form" class="animate">
              <h3 style="font-family: Poppins, sans-serif; margin-bottom: 10px">
                Product Media & Visibility
              </h3>
              <p id="product-media-status" class="form-status"></p>
              <label for="product-image-url">Product Image URL (optional)</label>
              <input id="product-image-url" type="url" placeholder="https://..." />
              <label for="product-image-file">Or choose product image from local PC</label>
              <input id="product-image-file" type="file" accept="image/*" />
              <label for="product-visibility-pages">Show Product On (multi-select)</label>
              <select id="product-visibility-pages" multiple size="8">
                <option value="home" selected>Home</option>
                <option value="shop" selected>Shop</option>
                <option value="product">Product Detail</option>
                <option value="about">About</option>
                <option value="services">Services</option>
                <option value="gallery">Gallery</option>
                <option value="contact">Contact</option>
                <option value="admin">Admin</option>
              </select>
              <small style="display:block; margin-bottom: 12px; color:#666;">Ctrl/Cmd key se multiple pages select karein.</small>
              <h3 style="font-family: Poppins, sans-serif; margin-bottom: 10px">
                Add Gallery Image
              </h3>
              <label for="gallery-image">Image URL (optional)</label>
              <input id="gallery-image" type="url" placeholder="https://..." />
              <label for="gallery-image-file">Or upload from local PC</label>
              <input id="gallery-image-file" type="file" accept="image/*" />
              <div class="image-preview-box">
                <img id="gallery-preview-image" src="" alt="Gallery preview" style="display: none" />
                <p id="gallery-preview-text">Preview will appear here</p>
              </div>
              <p id="gallery-status" class="form-status"></p>
              <button class="btn btn-primary" type="submit">Add Image</button>
            </form>
          </div>

          <section class="section" style="padding-bottom: 0">
            <h2 class="section-title">Manage Products</h2>
            <div id="admin-product-list"></div>
          </section>

          <section class="section" style="padding-bottom: 0">
            <h2 class="section-title">Manage Gallery</h2>
            <div id="admin-gallery-list"></div>
          </section>
        </section>
      </div>
    </main>

    <a
      class="whatsapp-float"
      href="https://wa.me/923001234567"
      target="_blank"
      rel="noreferrer"
      aria-label="WhatsApp"
      >WA</a
    >
    <script src="script.js"></script>
  </body>
</html>
